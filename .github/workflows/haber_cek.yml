name: Pusula-yi Sark Haber Botu
on:
  # Public repo = sınırsız dakika. Günde 12 run (2 saatte bir). Push tetiklemesi kapalı (fazla dakika yemesin).
  schedule:
    - cron: '0 */2 * * *'   # Her 2 saatte bir (00:00, 02:00, 04:00, ... UTC → TR +3)
  workflow_dispatch:        # Manuel: Actions → Run workflow
  # push kapalı; her push'ta run istemiyorsanız böyle kalsın

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Scraper ~15-30 dk sürer; 35 dk yeterli, gereksiz bekleme olmasın
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Dedektif - Şifreleri Kontrol Et
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then echo "❌ SUPABASE_URL EKSIK VEYA YANLIS YERDE!"; else echo "✅ SUPABASE_URL TAMAM!"; fi
          if [ -z "${{ secrets.SUPABASE_KEY }}" ]; then echo "❌ SUPABASE_KEY EKSIK VEYA YANLIS YERDE!"; else echo "✅ SUPABASE_KEY TAMAM!"; fi
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then echo "❌ OPENAI_API_KEY EKSIK VEYA YANLIS YERDE!"; else echo "✅ OPENAI_API_KEY TAMAM!"; fi
      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Bağımlılıkları Yükle
        run: npm ci
      - name: Haber botunu çalıştır
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRANSLATE_PROVIDER: ${{ secrets.TRANSLATE_PROVIDER }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
        run: npm run test:scraper
